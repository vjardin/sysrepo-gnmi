name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  checks: write
  actions: read

jobs:
  static-analysis:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      matrix:
        cesnet_version: [v2, v3, v4, v5]
    name: static-analysis (${{ matrix.cesnet_version }})
    steps:
      - uses: actions/checkout@v6
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential meson ninja-build cmake pkg-config \
            libgrpc-dev protobuf-compiler \
            libprotobuf-c-dev protobuf-c-compiler \
            libevent-dev libcjson-dev libpcre2-dev \
            cppcheck clang-tools clang
      - name: Download meson subprojects
        run: meson subprojects download || true
      - name: gcc -fanalyzer (${{ matrix.cesnet_version }})
        run: |
          meson setup builddir -Danalyzer=true -Dcesnet_version=${{ matrix.cesnet_version }}
          meson compile -C builddir 2>&1 | tee analyzer.log
          if grep -q "error:.*-fanalyzer" analyzer.log; then
            echo "::error::gcc -fanalyzer found issues"
            exit 1
          fi
      - name: cppcheck (${{ matrix.cesnet_version }})
        run: |
          cppcheck --project=builddir/compile_commands.json \
            --enable=warning,performance,portability \
            --suppress=missingIncludeSystem \
            --suppress=unusedFunction \
            --suppress=unmatchedSuppression \
            --suppress=preprocessorErrorDirective \
            -i subprojects -i proto/generated \
            --error-exitcode=1 2>&1 | tee cppcheck.log
      - name: clang scan-build (${{ matrix.cesnet_version }})
        run: |
          rm -rf builddir-scan
          scan-build meson setup builddir-scan -Dcesnet_version=${{ matrix.cesnet_version }}
          scan-build meson compile -C builddir-scan 2>&1 | tee scan.log || true

  test:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      matrix:
        cesnet_version: [v2, v3, v4, v5]
        sanitizer: [address, undefined]
    name: test-${{ matrix.sanitizer }} (${{ matrix.cesnet_version }})
    steps:
      - uses: actions/checkout@v6
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential meson ninja-build cmake pkg-config \
            libgrpc-dev protobuf-compiler \
            libprotobuf-c-dev protobuf-c-compiler \
            libevent-dev libcjson-dev libpcre2-dev \
            python3-venv
      - name: Install gnmic
        run: |
          GNMIC_DEB_URL=$(curl -s https://api.github.com/repos/openconfig/gnmic/releases/latest \
            | python3 -c "import sys,json; assets=json.load(sys.stdin)['assets']; print([a['browser_download_url'] for a in assets if a['name'].endswith('Linux_x86_64.deb')][0])")
          curl -sL "$GNMIC_DEB_URL" -o /tmp/gnmic.deb
          sudo dpkg -i /tmp/gnmic.deb
      - name: Create NACM test user
        run: sudo useradd -r -s /usr/sbin/nologin nacmtestuser 2>/dev/null || true
      - name: Download meson subprojects
        run: meson subprojects download || true
      - name: Build (${{ matrix.sanitizer }}, ${{ matrix.cesnet_version }})
        run: |
          meson setup builddir \
            -Dsanitize=${{ matrix.sanitizer }} \
            -Dcesnet_version=${{ matrix.cesnet_version }}
          meson compile -C builddir
      - name: Setup Python venv
        run: |
          python3 -m venv .venv
          .venv/bin/pip install grpcio grpcio-tools pytest
      - name: Generate Python gRPC stubs
        run: |
          mkdir -p tests/proto
          .venv/bin/python -m grpc_tools.protoc \
            -Iproto --python_out=tests/proto --grpc_python_out=tests/proto \
            proto/gnmi.proto proto/gnmi_ext.proto
      - name: Fix permissions for NACM tests
        run: |
          # /home/runner is 750 on GitHub Actions — nacmtestuser needs +x to traverse it
          chmod o+x /home/runner
      - name: Run tests
        env:
          LD_LIBRARY_PATH: ${{ github.workspace }}/builddir/deps/lib
          GNMI_BUILD_DIR: ${{ github.workspace }}/builddir
          GNMI_YANG_DIR: ${{ github.workspace }}/tests/yang
          no_proxy: localhost,127.0.0.1
          ASAN_OPTIONS: detect_leaks=0
          UBSAN_OPTIONS: print_stacktrace=1:halt_on_error=1
          GNMI_LOG_LEVEL_SR: 4
          GNMI_LOG_LEVEL_LY: 4
        run: |
          sudo -E .venv/bin/pytest tests/ -v --tb=short \
            --junitxml=${{ github.workspace }}/test-results-${{ matrix.cesnet_version }}-${{ matrix.sanitizer }}.xml
      - name: Test Report
        uses: dorny/test-reporter@v3
        if: always()
        with:
          name: tests-${{ matrix.cesnet_version }}-${{ matrix.sanitizer }}
          path: test-results-${{ matrix.cesnet_version }}-${{ matrix.sanitizer }}.xml
          reporter: java-junit
      - name: Compliance Summary
        if: always()
        run: |
          summary="${{ github.workspace }}/builddir/compliance-summary.md"
          if [ -f "$summary" ]; then
            echo "### ${{ matrix.cesnet_version }} / ${{ matrix.sanitizer }}" >> $GITHUB_STEP_SUMMARY
            cat "$summary" >> $GITHUB_STEP_SUMMARY
          fi
      - name: Upload test results
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: test-results-${{ matrix.cesnet_version }}-${{ matrix.sanitizer }}
          path: test-results-${{ matrix.cesnet_version }}-${{ matrix.sanitizer }}.xml

  deb:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      matrix:
        include:
          - distro: ubuntu
            release: noble
            label: ubuntu-24.04
          - distro: ubuntu
            release: plucky
            label: ubuntu-26.04
          - distro: debian
            release: trixie
            label: debian-13
    name: deb (${{ matrix.label }})
    container: ${{ matrix.distro }}:${{ matrix.release }}
    steps:
      - uses: actions/checkout@v6
      - name: Install build dependencies
        run: |
          apt-get update
          apt-get install -y \
            build-essential meson ninja-build cmake pkg-config git \
            libgrpc-dev protobuf-compiler \
            libprotobuf-c-dev protobuf-c-compiler \
            libevent-dev libcjson-dev libpcre2-dev \
            debhelper devscripts
      - name: Download meson subprojects
        run: |
          git config --global --add safe.directory '*'
          meson subprojects download || true
      - name: Build .deb
        run: |
          dpkg-buildpackage -us -uc -b
          mkdir -p deb-out
          cp ../sysrepo-gnmi_*.deb deb-out/
      - name: Show package info
        run: dpkg-deb -I deb-out/sysrepo-gnmi_*.deb
      - name: Upload .deb
        uses: actions/upload-artifact@v7
        with:
          name: deb-${{ matrix.label }}
          path: deb-out/sysrepo-gnmi_*.deb
