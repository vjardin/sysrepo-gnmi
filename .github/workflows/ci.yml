name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  static-analysis:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential meson ninja-build cmake pkg-config \
            libgrpc-dev protobuf-compiler \
            libprotobuf-c-dev protobuf-c-compiler \
            libevent-dev libcjson-dev libpcre2-dev \
            cppcheck clang-tools clang
      - name: Download meson subprojects
        run: meson subprojects download || true
      - name: Build with gcc -fanalyzer
        run: |
          meson setup builddir-analyzer -Danalyzer=true
          meson compile -C builddir-analyzer 2>&1 | tee analyzer.log
          if grep -q "error:.*-fanalyzer" analyzer.log; then
            echo "::error::gcc -fanalyzer found issues"
            exit 1
          fi
      - name: clang scan-build
        run: |
          rm -rf builddir-scan
          scan-build meson setup builddir-scan 2>&1 | tail -3
          scan-build meson compile -C builddir-scan 2>&1 | tee scan.log || true
      - name: cppcheck
        run: |
          meson setup builddir-cppcheck 2>/dev/null || true
          meson compile -C builddir-cppcheck 2>/dev/null || true
          cppcheck --project=builddir-cppcheck/compile_commands.json \
            --enable=warning,performance,portability \
            --suppress=missingIncludeSystem \
            --suppress=unusedFunction \
            --suppress=unmatchedSuppression \
            --suppress=preprocessorErrorDirective \
            -i subprojects -i proto/generated \
            --error-exitcode=1 2>&1 | tee cppcheck.log

  test-asan:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential meson ninja-build cmake pkg-config \
            libgrpc-dev protobuf-compiler \
            libprotobuf-c-dev protobuf-c-compiler \
            libevent-dev libcjson-dev libpcre2-dev \
            python3-venv
      - name: Download meson subprojects
        run: meson subprojects download || true
      - name: Build (ASAN)
        run: |
          meson setup builddir -Dsanitize=address
          meson compile -C builddir
      - name: Setup Python venv
        run: |
          python3 -m venv .venv
          .venv/bin/pip install grpcio grpcio-tools pytest
      - name: Generate Python gRPC stubs
        run: |
          mkdir -p tests/proto
          .venv/bin/python -m grpc_tools.protoc \
            -Iproto --python_out=tests/proto --grpc_python_out=tests/proto \
            proto/gnmi.proto proto/gnmi_ext.proto
      - name: Run tests (ASAN)
        env:
          LD_LIBRARY_PATH: ${{ github.workspace }}/builddir/deps/lib
          GNMI_BUILD_DIR: ${{ github.workspace }}/builddir
          GNMI_YANG_DIR: ${{ github.workspace }}/tests/yang
          no_proxy: localhost,127.0.0.1
          ASAN_OPTIONS: detect_leaks=0
        run: .venv/bin/pytest tests/ -v --tb=short

  test-ubsan:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential meson ninja-build cmake pkg-config \
            libgrpc-dev protobuf-compiler \
            libprotobuf-c-dev protobuf-c-compiler \
            libevent-dev libcjson-dev libpcre2-dev \
            python3-venv
      - name: Download meson subprojects
        run: meson subprojects download || true
      - name: Build (UBSAN)
        run: |
          meson setup builddir -Dsanitize=undefined
          meson compile -C builddir
      - name: Setup Python venv
        run: |
          python3 -m venv .venv
          .venv/bin/pip install grpcio grpcio-tools pytest
      - name: Generate Python gRPC stubs
        run: |
          mkdir -p tests/proto
          .venv/bin/python -m grpc_tools.protoc \
            -Iproto --python_out=tests/proto --grpc_python_out=tests/proto \
            proto/gnmi.proto proto/gnmi_ext.proto
      - name: Run tests (UBSAN)
        env:
          LD_LIBRARY_PATH: ${{ github.workspace }}/builddir/deps/lib
          GNMI_BUILD_DIR: ${{ github.workspace }}/builddir
          GNMI_YANG_DIR: ${{ github.workspace }}/tests/yang
          no_proxy: localhost,127.0.0.1
          UBSAN_OPTIONS: print_stacktrace=1:halt_on_error=1
        run: .venv/bin/pytest tests/ -v --tb=short
